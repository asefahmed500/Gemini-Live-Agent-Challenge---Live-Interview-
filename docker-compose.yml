services:
  postgres:
    image: postgres:16-alpine
    container_name: live_interview_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: asef
      POSTGRES_DB: live_interview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d live_interview"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: live_interview_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@interview.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
